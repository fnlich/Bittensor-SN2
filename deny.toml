[graph]
targets = []
all-features = false

[advisories]
yanked = "warn"
unmaintained = "workspace"
# wasmtime 8.0.1 is pulled transitively via sc-executor-wasmtime (Substrate runtime
# host used by subxt for chain RPC). The validator and miner do not execute
# untrusted WebAssembly; the only WASM ever loaded is the bittensor chain runtime
# downloaded from a trusted endpoint. Bumping wasmtime requires a coordinated
# Substrate upgrade across the dependency tree and is tracked separately.
ignore = [
    { crate = "wasmtime@8.0.1", reason = "Pulled transitively via sc-executor-wasmtime; we do not execute untrusted WASM. Patched versions require a Substrate-wide upgrade." },
]

[licenses]
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD-1-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "Unlicense",
    "CDLA-Permissive-2.0",
    "LicenseRef-Inference-Labs-Source-Grant",
]
confidence-threshold = 0.8

# Hashes must be regenerated when these crates are bumped: cargo deny check licenses
[[licenses.clarify]]
name = "ring"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "encoding_rs"
expression = "Apache-2.0 OR MIT"
license-files = [{ path = "LICENSE-APACHE", hash = 0xb23f3e28 }, { path = "LICENSE-MIT", hash = 0xb23f3e28 }]

# Inference Labs internal crates pulled transitively via JSTprove and dsperse.
# These crates ship without a SPDX license declaration; their upstream LICENSE
# file is the Inference Labs Source Access Grant, vendored at
# LICENSES/LicenseRef-Inference-Labs-Source-Grant.txt for human audit.
# Pinned to exact versions so a future republished version cannot inherit the
# clarification.
[[licenses.clarify]]
